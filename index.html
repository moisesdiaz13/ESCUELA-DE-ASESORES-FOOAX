<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#324AB6">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --mag:#F1228E;--mag-l:#FDE8F4;--mag-d:#C0006E;
  --ate:#FD6E29;--ate-l:#FFF0E8;
  --rio:#324AB6;--rio-l:#EBF0FC;
  --riq:#F2BB06;--riq-l:#FEF8E0;
  --green:#059669;--green-l:#E1F5EE;
  --red:#EF4444;--red-l:#FEE2E2;
  --amber:#F59E0B;--amber-l:#FEF3C7;
  --grad:linear-gradient(135deg,#324AB6,#F1228E);
  --grad2:linear-gradient(135deg,#F1228E,#FD6E29,#F2BB06);
  --white:#fff;--bg:#F0F4FF;--text:#1A1A1A;--text2:#555;--text3:#888;
  --border:#DDE4F5;--radius:16px;--radius-sm:10px;
  --shadow:0 2px 16px rgba(50,74,182,.10);
}
body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);overflow-x:hidden}

/* HEADER */
.app-header{background:var(--grad);padding:20px 20px 48px;position:relative;overflow:hidden}
.app-header::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;background:rgba(255,255,255,.07);border-radius:50%}
.app-header::after{content:'';position:absolute;bottom:-20px;left:0;right:0;height:40px;background:var(--bg);border-radius:40px 40px 0 0}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;position:relative}
.logo-badge{display:flex;align-items:center;gap:8px}
.logo-text{font-size:13px;font-weight:800;color:rgba(255,255,255,.9);letter-spacing:.5px}
.header-title{font-size:22px;font-weight:900;color:#fff;position:relative;line-height:1.2;margin-bottom:4px}
.header-sub{font-size:12px;color:rgba(255,255,255,.8);position:relative;font-weight:600}
.asesor-chip{background:rgba(255,255,255,.2);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;color:#fff;cursor:pointer}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:0 16px 16px;margin-top:-24px}
.stat-card{background:#fff;border-radius:14px;padding:12px 10px;box-shadow:var(--shadow);text-align:center}
.stat-val{font-size:22px;font-weight:900;color:var(--rio);line-height:1}
.stat-label{font-size:10px;color:var(--text3);margin-top:3px;font-weight:600;line-height:1.2}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:100;box-shadow:0 -4px 20px rgba(50,74,182,.08)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px;border:none;background:transparent;cursor:pointer;color:var(--text3);font-family:'Nunito',sans-serif;font-size:10px;font-weight:700;transition:color .2s}
.nav-item.active{color:var(--rio)}
.nav-icon{font-size:20px;line-height:1}

/* CONTENT */
.content{padding:0 16px 90px}
.section-title{font-size:13px;font-weight:800;color:var(--text3);letter-spacing:.5px;margin-bottom:10px;text-transform:uppercase}

/* NIVEL CARD */
.nivel-card{background:#fff;border-radius:var(--radius);margin-bottom:12px;box-shadow:var(--shadow);overflow:hidden}
.nivel-header{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.nivel-emoji{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.nivel-info{flex:1;min-width:0}
.nivel-nombre{font-size:14px;font-weight:800;color:var(--text);margin-bottom:2px}
.nivel-desc{font-size:11px;color:var(--text3);font-weight:600}
.nivel-prog{margin-top:6px;display:flex;align-items:center;gap:8px}
.prog-bar{flex:1;height:6px;background:var(--border);border-radius:10px;overflow:hidden}
.prog-fill{height:100%;border-radius:10px;transition:width .4s}
.prog-txt{font-size:10px;font-weight:700;color:var(--text3);white-space:nowrap}
.nivel-chevron{font-size:16px;color:var(--text3);transition:transform .3s}
.nivel-card.open .nivel-chevron{transform:rotate(180deg)}

/* SESIONES */
.sesiones-list{padding:0 12px 12px}
.sesion-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:6px;cursor:pointer;transition:background .15s;border:1px solid transparent}
.sesion-item:hover{background:var(--bg)}
.sesion-item.completada{background:var(--green-l);border-color:rgba(5,150,105,.15)}
.sesion-item.activa{background:var(--rio-l);border-color:rgba(50,74,182,.2)}
.sesion-item.bloqueada{opacity:.45;cursor:not-allowed}
.sesion-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.sesion-num.completada{background:var(--green);color:#fff}
.sesion-num.activa{background:var(--rio);color:#fff}
.sesion-num.bloqueada{background:var(--border);color:var(--text3)}
.sesion-info{flex:1;min-width:0}
.sesion-titulo{font-size:12px;font-weight:700;color:var(--text);margin-bottom:1px}
.sesion-semana{font-size:10px;color:var(--text3);font-weight:600}
.sesion-check{font-size:14px}

/* MODAL SESION */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end}
.modal-ov.open{display:flex}
.modal-box{background:#fff;border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;animation:slideUp .3s ease;position:relative}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:12px auto 0}
.modal-close-x{position:fixed;top:14px;right:14px;width:32px;height:32px;border-radius:50%;border:none;background:rgba(0,0,0,.06);color:var(--text2);font-size:15px;font-weight:800;cursor:pointer;z-index:210;display:flex;align-items:center;justify-content:center}
.modal-header{padding:16px 20px 12px;border-bottom:1px solid var(--border)}
.modal-emoji{font-size:32px;margin-bottom:8px}
.modal-nivel{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.modal-titulo{font-size:18px;font-weight:900;color:var(--text);line-height:1.3}
.modal-body{padding:16px 20px}
.content-section{background:var(--bg);border-radius:12px;padding:14px;margin-bottom:14px;font-size:13px;line-height:1.7;color:var(--text2)}
.content-section strong{color:var(--text);font-weight:800}
.accion-section{background:var(--rio-l);border-radius:12px;padding:12px 14px;margin-bottom:16px;border-left:3px solid var(--rio)}
.accion-label{font-size:10px;font-weight:800;color:var(--rio);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.accion-text{font-size:12px;color:var(--text2);line-height:1.5;font-weight:600}

/* PREGUNTA */
.pregunta-section{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px}
.pregunta-label{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.pregunta-text{font-size:14px;font-weight:800;color:var(--text);margin-bottom:14px;line-height:1.5}
.opcion-btn{width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text);cursor:pointer;margin-bottom:8px;text-align:left;transition:all .2s;display:flex;align-items:center;gap:10px}
.opcion-btn:hover{border-color:var(--rio);background:var(--rio-l)}
.opcion-btn.correcta{border-color:var(--green);background:var(--green-l);color:var(--green)}
.opcion-btn.incorrecta{border-color:var(--red);background:var(--red-l);color:var(--red)}
.opcion-letra{width:24px;height:24px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.resultado-msg{text-align:center;padding:12px;border-radius:10px;font-size:14px;font-weight:800;margin-top:8px}
.resultado-msg.ok{background:var(--green-l);color:var(--green)}
.resultado-msg.error{background:var(--red-l);color:var(--red)}
.btn-siguiente{width:100%;padding:14px;border-radius:12px;border:none;background:var(--grad);color:#fff;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;margin-top:12px}
.btn-siguiente:disabled{opacity:.4;cursor:not-allowed}

/* CERT */
.cert-card{background:var(--grad2);border-radius:16px;padding:20px;text-align:center;margin-bottom:16px;color:#fff}
.cert-emoji{font-size:48px;margin-bottom:8px}
.cert-titulo{font-size:18px;font-weight:900;margin-bottom:4px}
.cert-sub{font-size:12px;opacity:.85;margin-bottom:16px}
.cert-btn{background:rgba(255,255,255,.25);border:1.5px solid rgba(255,255,255,.5);color:#fff;padding:10px 24px;border-radius:20px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer}

/* PERFIL */
.perfil-card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:12px}
.perfil-avatar{width:72px;height:72px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#fff;margin:0 auto 12px}
.perfil-nombre{font-size:18px;font-weight:900;text-align:center;margin-bottom:2px}
.perfil-cargo{font-size:12px;color:var(--text3);text-align:center;font-weight:600;margin-bottom:16px}
.perfil-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pstat{background:var(--bg);border-radius:10px;padding:10px;text-align:center}
.pstat-val{font-size:20px;font-weight:900;color:var(--rio)}
.pstat-label{font-size:10px;color:var(--text3);font-weight:600;margin-top:2px}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1A1A1A;color:#fff;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;z-index:500;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* WELCOME */
.welcome-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.welcome-box{background:#fff;border-radius:24px;padding:28px 24px;width:100%;max-width:380px;text-align:center}
.welcome-logo{font-size:48px;margin-bottom:12px}
.welcome-title{font-size:22px;font-weight:900;color:var(--text);margin-bottom:6px}
.welcome-sub{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.5}
.welcome-input{width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid var(--border);font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;outline:none;margin-bottom:10px;color:var(--text)}
.welcome-input:focus{border-color:var(--rio)}
.welcome-select{width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid var(--border);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;outline:none;margin-bottom:16px;color:var(--text);background:#fff;appearance:none;-webkit-appearance:none}
.welcome-btn{width:100%;padding:14px;border-radius:12px;border:none;background:var(--grad);color:#fff;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;cursor:pointer}
</style>
</head>

async function supaUpsert(tabla, body, onConflict){
  try{
    await fetch(SUPA_URL+'/rest/v1/'+tabla+'?on_conflict='+onConflict,{

      headers:{
        'apikey':SUPA_KEY,

  if(!S.nombre) return;
  await supaUpsert('asesores', {
    nombre: S.nombre,
    cargo: S.cargo,
    updated_at: new Date().toISOString()
  }, 'nombre');
}

      {num:3,titulo:'Los 4 principios ESH-Líder de FOOax',
       contenido:`<strong>Los 4 principios que guían a todo el equipo FOOax:</strong><br><br><strong>1. Disciplina</strong><br>Cumplir compromisos, llegar a tiempo, entregar resultados. La disciplina del asesor/a es el espejo de la disciplina del centro.<br><br><strong>2. Unidad</strong><br>El equipo avanza junto. Compartir estrategias, apoyarse en los centros difíciles y celebrar los logros de todos.<br><br><strong>3. Valor</strong><br>Atreverse a tener conversaciones difíciles con las clientas, proponer soluciones creativas, no rendirse ante los atrasos.<br><br><strong>4. Trabajo Duro</strong><br>El portafolio sólido se construye visita a visita, semana a semana, con consistencia y esfuerzo sostenido.`,
       accion:'Evalúa honestamente: ¿cuál de los 4 principios necesitas fortalecer esta semana?',
       pregunta:'¿Cuáles son los 4 principios ESH-Líder de FOOax?',
       opciones:['Ahorro, Inversión, Pago y Crecimiento','Disciplina, Unidad, Valor y Trabajo Duro','Respeto, Honestidad, Puntualidad y Ahorro','Confianza, Apoyo, Solidaridad y Esfuerzo'],correcta:1},
      {num:4,titulo:'El rol del asesor/a en la comunidad',
       contenido:`<strong>¿Qué hace diferente a un asesor/a FOOax?</strong><br><br>Un asesor/a de FOOax no es solo un cobrador — es un <strong>agente de transformación económica</strong> en su comunidad.<br><br><strong>Tus tres roles fundamentales:</strong><br><br><strong>1. Educador/a financiero/a</strong><br>Acompañas a las clientas en su aprendizaje — desde la app hasta la Escuela de Clientas.<br><br><strong>2. Evaluador/a de riesgo</strong><br>Conoces a las clientas, sus negocios y su capacidad de pago. Tu juicio protege a FOOax y a las propias clientas.<br><br><strong>3. Promotor/a de crecimiento</strong><br>Identificas qué clientas están listas para el siguiente nivel y las acompañas en ese proceso.`,
       accion:'Esta semana visita el centro que más atención necesita y aplica los 3 roles.',
       pregunta:'¿Cuáles son los tres roles fundamentales de un asesor/a FOOax?',
       opciones:['Cobrador, vigilante y reportero','Educador/a financiero/a, evaluador/a de riesgo y promotor/a de crecimiento','Vendedor/a, supervisor/a y contador/a','Administrador/a, cajero/a y promotor/a'],correcta:1},
      {num:5,titulo:'Las 10 decisiones de cada integrante FOOax',
       contenido:`<strong>Cada clienta FOOax aplica 10 decisiones de vida:</strong><br><br>1. Seguiremos los 4 principios: Disciplina, Unidad, Valor y Trabajo Duro<br>2. La prosperidad llegará a través del trabajo duro<br>3. Cuidaremos nuestra salud y minimizaremos gastos<br>4. Brindaremos educación a nuestros hijos<br>5. Trabajaremos más, produciremos más y venderemos nuestros excedentes<br>6. Siempre estaremos preparadas para ayudarnos entre sí<br>7. Si hay problemas en el centro, todas ayudaremos a restaurar el orden<br>8. No cometeremos injusticias ni permitiremos que alguien las cometa<br>9. Mantendremos a nuestros hijos y entorno limpios<br>10. Siempre utilizaremos agua limpia<br><br><strong>Como asesor/a, refuerzas estas decisiones en cada visita.</strong>`,
       accion:'En tu próxima reunión de centro, menciona al menos una de las 10 decisiones.',

      {num:6,titulo:'La app de clientas — tu herramienta de seguimiento',
       contenido:`<strong>La app FOOax para clientas:</strong><br><a href="https://fooax-app.vercel.app" style="color:var(--rio);font-weight:700">fooax-app.vercel.app</a><br><br><strong>¿Qué registra la clienta?</strong><br>• Ventas y gastos del negocio (semanal)<br>• Gastos del hogar<br>• Progreso en la Escuela de Clientas<br>• Historial de 6 meses<br><br><strong>¿Cómo usas tú esta información?</strong><br>• Verifica que la clienta esté registrando<br>• Usa los datos como evidencia en la evaluación de crédito<br>• Identifica clientas con negocios en crecimiento para el siguiente nivel<br><br><strong>La Escuela de Clientas tiene 7 niveles:</strong><br>Conoce tu app → Mis raíces FOOax → Semilla → Flor → Cosecha → Digital → Integral`,

       contenido:`<strong>Panel de Dirección FOOax:</strong><br><a href="https://fooax-panel.vercel.app" style="color:var(--rio);font-weight:700">fooax-panel.vercel.app</a><br><br><strong>¿Qué puedes ver ahí?</strong><br>• Todas las clientas registradas en la app<br>• Progreso por centro<br>• Certificados obtenidos en la Escuela<br>• Nuevas clientas registradas hoy y esta semana<br><br><strong>¿Cómo te ayuda como asesor/a?</strong><br>• Identifica qué centros tienen más clientas activas en la app<br>• Detecta qué clientas están avanzando en su educación financiera<br>• Prioriza visitas a centros con menor actividad digital<br><br>Esta información complementa tu visión de campo con datos reales.`,

      {num:8,titulo:'🎓 Evaluación — FOOax y su modelo',
       contenido:`<strong>¡Completaste el Nivel 1!</strong><br><br>Ya conoces a fondo el modelo FOOax:<br><br>✅ La historia y visión de FOOax<br>✅ Los 4 productos de crédito<br>✅ Los 4 principios ESH-Líder<br>✅ Tu triple rol como asesor/a<br>✅ Las 10 decisiones de las clientas<br>✅ La app de clientas y el panel<br><br><strong>Este conocimiento te hace un mejor asesor/a</strong> — porque cuando entiendes el modelo completo, puedes explicárselo a tus clientas con seguridad y convicción.<br><br>¡Obtén tu certificado y continúa al Nivel 2!`,

  grupos:{
    nombre:'Los grupos solidarios',emoji:'👥',color:'059669',
    desc:'Condiciones, cargos, responsabilidades y protocolo',
    sesiones:[
      {num:1,titulo:'Las 7 condiciones para formar un grupo',
       contenido:`<strong>Para que un grupo sea válido en FOOax:</strong><br><br>1. Todas deben tener algún emprendimiento<br>2. Exactamente 5 miembros mujeres<br>3. Misma colonia o población — deben conocerse bien<br>4. Condición económica similar<br>5. Un miembro por casa — no dos del mismo hogar<br>6. Sin lazos sanguíneos entre miembros<br>7. Una presidenta, una secretaria y tres miembros<br><br><strong>¿Por qué son importantes estas condiciones?</strong><br>Garantizan confianza, responsabilidad compartida y reducen el riesgo de incumplimiento. Un grupo mal formado genera problemas desde el inicio.<br><br><strong>Tu rol:</strong> verificar estas condiciones antes de integrar un grupo nuevo.`,
       accion:'Revisa tu cartera — ¿algún grupo tiene integrantes que no cumplen las 7 condiciones?',
       pregunta:'¿Cuántas integrantes debe tener un grupo FOOax y cómo se conforman?',
       opciones:['3 mujeres: presidenta, secretaria y tesorera','5 mujeres: una presidenta, una secretaria y tres miembros','10 integrantes elegidas por el asesor/a','El número lo decide la dirección'],correcta:1},
      {num:2,titulo:'Los cargos del centro y la renovación',
       contenido:`<strong>Los tres cargos del centro:</strong><br><br><strong>Presidenta</strong><br>Líder del centro. Gestiona la dinámica del grupo, toma decisiones en las propuestas de crédito, firma como testigo cuando las miembros reciben su préstamo y mantiene la disciplina.<br><br><strong>Secretaria</strong><br>Respaldo de la presidenta. Toma su lugar cuando se ausenta, firma como testigo cuando la presidenta recibe su préstamo y comparte la responsabilidad del seguimiento.<br><br><strong>Miembros (3)</strong><br>Participación activa, cumplimiento de pagos y responsabilidad solidaria.<br><br><strong>Renovación de cargos: cada enero.</strong><br>Como asesor/a, facilitas ese proceso y verificas que la nueva estructura esté registrada.`,
       accion:'Verifica que todos tus centros tengan clara su estructura de cargos actualizada.',
       pregunta:'¿Cada cuándo se renuevan los cargos en los centros FOOax?',
       opciones:['Cada 6 meses','Cada 2 años','Cada año en el mes de enero','Cuando el asesor/a lo decida'],correcta:2},
      {num:3,titulo:'Las 7 responsabilidades de la presidenta',
       contenido:`<strong>La presidenta tiene 7 responsabilidades clave:</strong><br><br>1. Conocer bien a todos los miembros del centro<br>2. Antes de cada reunión: pasar asistencia y recoger libretas con pagos<br>3. Participar en la decisión de propuesta de préstamos de los miembros<br>4. Firmar como testigo cuando los miembros reciben su préstamo<br>5. Vigilar la adecuada utilización del préstamo de los miembros<br>6. Resolver problemas en caso de falta de pago de algún miembro<br>7. Mantener la disciplina del centro<br><br><strong>Tu rol como asesor/a:</strong><br>Apoyar a la presidenta para que cumpla estas responsabilidades. Si la presidenta no funciona bien, el centro se deteriora. Capacítala, oriéntala y dale seguimiento.`,
       accion:'Esta semana habla con la presidenta de tu centro con más retos y apóyala en sus responsabilidades.',
       pregunta:'¿Qué hace la presidenta cuando una miembro del grupo recibe su préstamo?',
       opciones:['Decide en qué invertirlo','Firma como testigo cuando la miembro recibe su préstamo','Guarda el dinero hasta que lo necesite','Reporta a la asesora antes de entregarlo'],correcta:1},
      {num:4,titulo:'Responsabilidades de la secretaria y los miembros',
       contenido:`<strong>La secretaria tiene 5 responsabilidades:</strong><br><br>1. Conocer bien a todos los miembros del centro<br>2. Responsabilidad compartida con la presidenta<br>3. Cuando la presidenta se ausente, tomar su lugar<br>4. Firmar como testigo cuando la presidenta recibe su préstamo<br>5. Revisar conjuntamente la adecuada utilización de préstamos<br><br><strong>Cada miembro tiene 5 responsabilidades:</strong><br><br>1. Llegar 10 minutos antes<br>2. Firmar la libreta de asistencia<br>3. Pasar la libreta con el pago a la presidenta<br>4. Utilizar adecuadamente el préstamo<br>5. En caso de falta de pago de otro miembro: dar el solidario`,
       accion:'Verifica en tu próxima visita que todas las miembros estén llegando 10 minutos antes.',
       pregunta:'¿Cuántos minutos antes deben llegar las miembros a la reunión del centro?',
       opciones:['5 minutos','A la hora exacta','10 minutos antes','15 minutos antes'],correcta:2},
      {num:5,titulo:'El solidario — cómo funciona y cuándo aplicarlo',
       contenido:`<strong>¿Qué es el solidario?</strong><br>Cuando una integrante no puede hacer su pago, las demás miembros del grupo cubren ese monto entre todas.<br><br><strong>¿Cómo se calcula?</strong><br>Si el pago pendiente es $500 y el grupo tiene 5 integrantes, cada una aporta $100. Si la que tiene el atraso puede aportar algo, su parte se reduce proporcionalmente.<br><br><strong>¿Cuándo activarlo?</strong><br>Cuando una clienta notifica con anticipación que no podrá pagar. El solidario no es un castigo — es la red de seguridad del grupo.<br><br><strong>Tu rol como asesor/a:</strong><br>Explicar el solidario desde el inicio, facilitar su aplicación cuando ocurra y evitar que el grupo lo vea como una carga injusta.`,
       accion:'Explica el concepto de solidario en tu próxima reunión de centro como recordatorio.',
       pregunta:'¿Cómo se activa el solidario en un centro FOOax?',
       opciones:['La dirección lo ordena cuando hay atraso','Cuando una integrante no puede pagar, las demás cubren ese monto entre todas','Es una multa que paga quien falta','Solo aplica cuando hay más de 3 atrasos'],correcta:1},
      {num:6,titulo:'El protocolo de las reuniones de centro',
       contenido:`<strong>Una reunión de centro bien conducida:</strong><br><br><strong>Antes de la reunión:</strong><br>• La presidenta avisa el horario con anticipación<br>• Las miembros deben llegar 10 minutos antes<br><br><strong>Durante la reunión:</strong><br>• La presidenta pasa lista de asistencia<br>• Se recogen las libretas individuales con los pagos<br>• El asesor/a verifica los montos y anota en su registro<br>• Se revisa la bitácora grupal<br>• Se atienden novedades del grupo<br><br><strong>Después de la reunión:</strong><br>• El asesor/a registra la supervisión en la app<br>• Se generan acciones acordadas con el grupo<br><br><strong>Tiempo estimado: 20-30 minutos máximo.</strong>`,
       accion:'Aplica el protocolo completo en tu próxima visita y registra todo en la app de supervisión.',
       pregunta:'¿Cuál es el tiempo estimado ideal para una reunión de centro FOOax?',
       opciones:['5-10 minutos','20-30 minutos máximo','1 hora','El tiempo que sea necesario'],correcta:1},
      {num:7,titulo:'Centros problemáticos — estrategias de intervención',
       contenido:`<strong>¿Cuándo un centro es problemático?</strong><br>• Asistencia menor al 60% de forma recurrente<br>• Atrasos frecuentes sin solidario aplicado<br>• Conflictos entre miembros no resueltos<br>• Presidenta que no ejerce sus responsabilidades<br><br><strong>Estrategia de intervención en 3 pasos:</strong><br><br><strong>1. Diagnóstico</strong><br>¿Cuál es la causa raíz? ¿Es económica, personal, de liderazgo?<br><br><strong>2. Reunión extraordinaria</strong><br>Convoca a todas las miembros, establece compromisos concretos con fechas.<br><br><strong>3. Seguimiento intensivo</strong><br>Visitas más frecuentes hasta que el centro se estabilice. Documenta todo en la app de supervisión.`,
       accion:'Identifica tu centro más problemático y aplica el diagnóstico de los 3 pasos.',
       pregunta:'¿Cuál es el primer paso al intervenir un centro problemático?',
       opciones:['Suspender el crédito inmediatamente','Hacer un diagnóstico para identificar la causa raíz del problema','Cambiar a la presidenta sin previo aviso','Reportar a dirección sin actuar primero'],correcta:1},
      {num:8,titulo:'🎓 Evaluación — Los grupos solidarios',
       contenido:`<strong>¡Completaste el Nivel 2!</strong><br><br>Ahora dominas todo sobre los grupos:<br><br>✅ Las 7 condiciones de un grupo válido<br>✅ Los cargos y su renovación anual<br>✅ Las 7 responsabilidades de la presidenta<br>✅ Las responsabilidades de la secretaria y los miembros<br>✅ El solidario — cómo y cuándo aplicarlo<br>✅ El protocolo de reuniones<br>✅ Estrategias para centros problemáticos<br><br>Este nivel es el corazón del trabajo de campo. ¡Obtén tu certificado!`,
       accion:'Comparte tu certificado de Nivel 2 con tu supervisora/supervisor.',
       pregunta:'¿Cuáles son los 3 pasos para intervenir un centro problemático?',
       opciones:['Suspender, reportar y esperar instrucciones','Diagnóstico, reunión extraordinaria y seguimiento intensivo','Cambiar la presidenta, renovar el grupo y empezar de cero','Visitar más seguido, cobrar y documentar'],correcta:1},
    ]
  },
  cobranza:{
    nombre:'Cobranza efectiva',emoji:'💰',color:'F2BB06',
    desc:'Proceso de cobro, libretas, bitácora y manejo de atrasos',
    sesiones:[
      {num:1,titulo:'El proceso de cobranza semanal',
       contenido:`<strong>El ciclo de cobranza FOOax:</strong><br><br><strong>Antes de la visita:</strong><br>• Revisa tu registro de pagos de la semana anterior<br>• Identifica quién tiene pagos pendientes<br>• Lleva tu lista de centros del día organizada por horario<br><br><strong>Durante la visita:</strong><br>• La presidenta entrega las libretas con los pagos<br>• Verificas monto, semana y firma<br>• Registras en tu control los pagos recibidos<br>• Si hay faltante, aplicas el proceso de atraso<br><br><strong>Después de la visita:</strong><br>• Actualizas tu registro general<br>• Reportas novedades al supervisor<br>• Registras la supervisión en la app si corresponde`,
       accion:'Organiza tu ruta de esta semana por horario y verifica que llevas tu registro actualizado.',
       pregunta:'¿Cuál es el primer paso antes de realizar una visita de cobranza?',
       opciones:['Llegar al centro y esperar a las clientas','Revisar el registro de pagos e identificar quién tiene pendientes','Llamar a la presidenta para confirmar asistencia','Llevar efectivo por si se necesita cambio'],correcta:1},
      {num:2,titulo:'La libreta individual — uso correcto',
       contenido:`<strong>¿Qué es la libreta individual?</strong><br>Es el registro personal de cada clienta donde se anotan sus pagos semana a semana. Es el documento oficial de su historial de crédito con FOOax.<br><br><strong>¿Cómo debe estar la libreta?</strong><br>• Con cada semana anotada con fecha, monto y firma<br>• Sin semanas en blanco o incompletas<br>• Legible y en buen estado<br>• La clienta la lleva a cada reunión<br><br><strong>Señales de alerta:</strong><br>• Semanas borradas o enmendadas<br>• Firmas que no coinciden con la clienta<br>• Montos incompletos sin justificación<br>• Libreta que "se olvidó" frecuentemente<br><br><strong>Tu rol:</strong> revisar libretas en cada visita y reportar irregularidades.`,
       accion:'En tu próxima visita, revisa una por una las libretas de tu centro más complejo.',
       pregunta:'¿Cuál es una señal de alerta en una libreta individual?',
       opciones:['Que esté muy usada o desgastada','Semanas borradas, montos incompletos o firmas irregulares','Que la clienta la lleve en una bolsa','Que tenga anotaciones adicionales de la clienta'],correcta:1},
      {num:3,titulo:'La bitácora grupal — función y mantenimiento',
       contenido:`<strong>¿Qué es la bitácora grupal?</strong><br>Es el registro oficial del centro — no de cada clienta, sino del grupo completo. La lleva la presidenta o secretaria.<br><br><strong>¿Qué debe contener?</strong><br>• Fecha de cada reunión<br>• Lista de asistencia<br>• Montos totales cobrados<br>• Novedades del grupo<br>• Acuerdos tomados<br>• Firma del asesor/a<br><br><strong>¿Por qué es importante?</strong><br>Es la memoria del centro. En caso de conflicto, la bitácora es la evidencia. Un centro sin bitácora actualizada es un centro con riesgo elevado.<br><br><strong>Tu firma en la bitácora es tu aval.</strong>`,
       accion:'Verifica que la bitácora de tus centros esté al corriente. Si no lo está, establece un plan de puesta al día.',
       pregunta:'¿Qué certifica tu firma en la bitácora grupal de un centro?',
       opciones:['Que ya cobraste todos los pagos','Que verificaste la reunión, los asistentes y las novedades — es tu aval oficial','Que el centro está al corriente en pagos','Solo es un requisito administrativo sin relevancia real'],correcta:1},
      {num:4,titulo:'Tipos de atraso y cómo manejarlos',
       contenido:`<strong>Tipo 1: Atraso con aviso previo</strong><br>La clienta notifica que no podrá pagar. Activa el solidario, documenta el acuerdo de pago.<br><br><strong>Tipo 2: Atraso sin aviso</strong><br>La clienta no asiste y no notificó. Contacta a la presidenta ese mismo día. Visita domiciliaria si no hay respuesta en 24h.<br><br><strong>Tipo 3: Atraso recurrente</strong><br>La clienta tiene 2 o más semanas de atraso. Reunión individual, plan de pago formal, escalamiento a supervisor si no hay acuerdo.<br><br><strong>Tipo 4: Atraso crítico</strong><br>Más de 4 semanas. Protocolo de recuperación especial. Documentación completa para dirección.<br><br><strong>Regla de oro:</strong> nunca dejes pasar más de 48 horas sin actuar ante un atraso.`,
       accion:'Clasifica los atrasos actuales de tu cartera en los 4 tipos y define una acción para cada uno.',
       pregunta:'¿Cuánto tiempo máximo debes esperar antes de actuar ante un atraso?',
       opciones:['1 semana','Al mes siguiente','48 horas','Hasta que la clienta se comunique'],correcta:2},
      {num:5,titulo:'La visita domiciliaria — cuándo y cómo',
       contenido:`<strong>¿Cuándo hacer una visita domiciliaria?</strong><br>• Clienta con atraso sin respuesta en 24-48 horas<br>• Grupo reporta que la clienta está en una situación difícil<br>• Solicitud de crédito Micronegocio o MAGNUS<br>• Clienta nueva para verificar negocio y domicilio<br><br><strong>Cómo prepararte:</strong><br>• Lleva el expediente de la clienta<br>• Ve acompañado/a si hay riesgo<br>• Anota la dirección exacta con referencia<br>• Lleva tu app de supervisión para registrar<br><br><strong>Durante la visita:</strong><br>• Escucha primero, propón soluciones después<br>• Define un acuerdo concreto con fecha<br>• Documenta todo — fotos, notas, acuerdos<br><br><strong>Después:</strong><br>• Reporta a supervisor con el resultado`,
       accion:'Identifica qué clientas de tu cartera requieren visita domiciliaria esta semana.',
       pregunta:'¿Cuándo es obligatorio hacer una visita domiciliaria?',
       opciones:['Solo para créditos MAGNUS','Cuando hay atraso sin respuesta en 24-48 horas o se solicita crédito mayor','Cada mes sin excepción','Solo cuando la dirección lo solicita'],correcta:1},
      {num:6,titulo:'Negociación y acuerdos de pago',
       contenido:`<strong>Principios de negociación con clientas en atraso:</strong><br><br><strong>1. Escucha antes de exigir</strong><br>Entiende qué pasó — una enfermedad, una pérdida de ventas, un imprevisto. El contexto determina la solución.<br><br><strong>2. Propón, no impongas</strong><br>"¿Qué puedes pagar esta semana?" abre mucho más espacio que "tienes que pagar X".<br><br><strong>3. Acuerdos concretos y documentados</strong><br>Fecha exacta, monto exacto, testigo (presidenta). Sin compromisos vagos.<br><br><strong>4. Cumplimiento antes que penalización</strong><br>Un acuerdo cumplido vale más que una sanción. El objetivo es recuperar el pago y mantener a la clienta.<br><br><strong>5. Escala cuando no hay acuerdo</strong><br>Si después de 2 intentos no hay acuerdo, reporta a supervisor con toda la documentación.`,
       accion:'Aplica los 5 principios en tu próxima negociación con una clienta en atraso.',
       pregunta:'¿Cuál es el principio más importante al negociar con una clienta en atraso?',

function onSeleccionAsesor(){
  const nombre = document.getElementById('w-nombre').value;
  const esInvitado = nombre === 'Invitado';
  document.getElementById('w-pass').style.display = (nombre && !esInvitado) ? 'block' : 'none';
}

function iniciarSesion(){
  const nombre = document.getElementById('w-nombre').value;
  const pass = document.getElementById('w-pass').value;
  if(!nombre){ showToast('⚠️ Selecciona tu nombre'); return; }
  if(nombre !== 'Invitado'){
    if(!pass){ showToast('⚠️ Escribe tu contraseña'); return; }
    if(ASESOR_PASS[nombre] !== pass){ showToast('❌ Contraseña incorrecta'); return; }
  }
  S = {nombre, cargo: nombre==='Invitado' ? 'Invitado/a' : 'Asesor/a FOOax'};
  guardar();
  syncAsesor();
  document.getElementById('welcome-modal').style.display='none';
  mostrarApp();
}

function mostrarApp(){
  document.getElementById('app-header').style.display='block';
  document.getElementById('stats-row').style.display='grid';
  document.getElementById('content').style.display='block';
  document.getElementById('bottom-nav').style.display='flex';
  // Nombre en header
  const nombres = S.nombre.split(' ');
  document.getElementById('header-title').textContent = `Hola, ${nombres[0]} 👋`;
  document.getElementById('asesor-chip').textContent = nombres[0];
  actualizarStats();
  renderEscuela();
}

    const comp = ses.filter(s=>progreso[nid+'_'+s.num]?.completada).length;
    completadas+=comp;
    if(comp===ses.length) niveles++;
  });
  document.getElementById('s-completadas').textContent=completadas;
  document.getElementById('s-niveles').textContent=niveles;
  document.getElementById('s-pct').textContent=Math.round(completadas/TOTAL_SES*100)+'%';
}

function setNav(nav){
  navActual=nav;
  ['escuela','perfil'].forEach(n=>{
    document.getElementById('view-'+n).style.display=n===nav?'block':'none';
    const btn=document.getElementById('nav-'+n);
    if(btn) btn.classList.toggle('active',n===nav);
  });
  if(nav==='escuela') renderEscuela();
  if(nav==='perfil') renderPerfil();
}

// ── ESCUELA ──
function renderEscuela(){
  const el=document.getElementById('view-escuela');
  let html='';
  NIVEL_ORDER.forEach((nid,idx)=>{
    const nivel=NIVELES[nid];
    const ses=nivel.sesiones;
    const comp=ses.filter(s=>progreso[nid+'_'+s.num]?.completada).length;
    const pct=Math.round(comp/ses.length*100);
    const desbloqueado=idx===0||ses.filter(s=>progreso[NIVEL_ORDER[idx-1]+'_'+s.num]?.completada).length===NIVELES[NIVEL_ORDER[idx-1]].sesiones.length;
    const abierto=nivelAbierto===nid;
    const colorHex=nivel.color;
    html+=`<div class="nivel-card${abierto?' open':''}">
      <div class="nivel-header" onclick="toggleNivel('${nid}')">
        <div class="nivel-emoji" style="background:#${colorHex}20">
          <span>${nivel.emoji}</span>
        </div>
        <div class="nivel-info">
          <div class="nivel-nombre">${nivel.nombre}</div>
          <div class="nivel-desc">${nivel.desc}</div>
          <div class="nivel-prog">
            <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:#${colorHex}"></div></div>
            <span class="prog-txt">${comp}/${ses.length}</span>
          </div>
        </div>
        <span class="nivel-chevron">▾</span>
      </div>`;
    if(abierto){
      html+='<div class="sesiones-list">';
      ses.forEach((s,si)=>{
        const p=progreso[nid+'_'+s.num]||{};
        const prevCompletada = si===0 || (progreso[nid+'_'+ses[si-1].num]?.completada);
        const estado = p.completada ? 'completada' : (prevCompletada ? 'activa' : 'bloqueada');
        html+=`<div class="sesion-item ${estado}" onclick="abrirSesion('${nid}',${s.num},'${estado}')">
          <div class="sesion-num ${estado}">${p.completada?'✓':s.num}</div>
          <div class="sesion-info">
            <div class="sesion-titulo">${s.titulo}</div>
            <div class="sesion-semana">Sesión ${s.num}</div>
          </div>
          <span class="sesion-check">${p.completada?'✅':estado==='activa'?'▶':'🔒'}</span>
        </div>`;
      });
      // Certificado si completó
      if(comp===ses.length){
        html+=`<div class="cert-card" style="margin-top:8px">
          <div class="cert-emoji">🎓</div>
          <div class="cert-titulo">${nivel.nombre}</div>
          <div class="cert-sub">¡Nivel completado!</div>
          <button class="cert-btn" onclick="generarCert('${nid}')">Ver mi certificado</button>
        </div>`;
      }
      html+='</div>';
    }
    html+='</div>';
  });
  el.innerHTML=html;
}

function toggleNivel(nid){
  nivelAbierto=nivelAbierto===nid?null:nid;
  renderEscuela();
}

// ── SESION MODAL ──
function abrirSesion(nid, num, estado){
  if(estado==='bloqueada'){
    showToast('🔒 Completa la sesión anterior primero');
    return;
  }
  sesionNivel=nid;
  sesionActual=num;
  respRespondida=false;
  viendoContenido=true;
  renderModal();
  document.getElementById('sesion-modal').classList.add('open');
  document.body.style.overflow='hidden';
}

function cerrarModal(){
  document.getElementById('sesion-modal').classList.remove('open');
  document.body.style.overflow='';
  sesionActual=null;
  sesionNivel=null;
}

function renderModal(){
  const nivel=NIVELES[sesionNivel];
  const s=nivel.sesiones.find(x=>x.num===sesionActual);
  const p=progreso[sesionNivel+'_'+s.num]||{};
  const letras=['A','B','C','D'];
  const colorHex=nivel.color;

  let html=`
    <div class="modal-header">
      <div class="modal-emoji">${nivel.emoji}</div>
      <div class="modal-nivel" style="color:#${colorHex}">${nivel.nombre} · Sesión ${s.num}</div>
      <div class="modal-titulo">${s.titulo}</div>
    </div>
    <div class="modal-body">`;

  if(viendoContenido){
    // Mostrar contenido primero
    html+=`<div class="content-section">${s.contenido}</div>`;
    if(s.accion){
      html+=`<div class="accion-section">
        <div class="accion-label">🎯 Acción de esta semana</div>
        <div class="accion-text">${s.accion}</div>
      </div>`;
    }
    html+=`<button class="btn-siguiente" onclick="verPregunta()">Ir a la pregunta ▶</button>`;
  } else {
    // Mostrar pregunta
    html+=`<div class="pregunta-section">
      <div class="pregunta-label">📝 Pregunta de evaluación</div>
      <div class="pregunta-text">${s.pregunta}</div>`;
    s.opciones.forEach((op,i)=>{
      let cls='opcion-btn';
      if(p.respondida){
        if(i===s.correcta) cls+=' correcta';
        else if(i===p.respuesta&&p.respuesta!==s.correcta) cls+=' incorrecta';
      }
      html+=`<button class="${cls}" onclick="${p.respondida?'':'responder('+i+')'}" ${p.respondida?'disabled':''}>
        <span class="opcion-letra">${letras[i]}</span>${op}
      </button>`;
    });
    if(p.respondida){
      const ok=p.respuesta===s.correcta;
      html+=`<div class="resultado-msg ${ok?'ok':'error'}">${ok?'✅ ¡Correcto!':'❌ La respuesta correcta es: '+s.opciones[s.correcta]}</div>`;
      if(!p.completada||sesionActual<nivel.sesiones.length){
        html+=`<button class="btn-siguiente" onclick="siguiente()">
          ${sesionActual<nivel.sesiones.length?'Siguiente sesión ▶':'🎓 Completar nivel'}
        </button>`;
      }
    }
    html+=`</div>`;
    html+=`<button style="width:100%;padding:11px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;margin-top:8px" onclick="verContenido()">← Ver contenido</button>`;
  }

  html+=`</div>`;
  document.getElementById('modal-content').innerHTML=html;
}

function verPregunta(){
  viendoContenido=false;
  renderModal();
}

function verContenido(){
  viendoContenido=true;
  renderModal();
}

function responder(idx){
  const s=NIVELES[sesionNivel].sesiones.find(x=>x.num===sesionActual);
  const key=sesionNivel+'_'+s.num;
  if(!progreso[key]) progreso[key]={};
  progreso[key].respondida=true;
  progreso[key].respuesta=idx;
  const ok=idx===s.correcta;
  if(ok){
    progreso[key].completada=true;
    showToast('✅ ¡Correcto!');
  } else {
    showToast('❌ Intenta de nuevo la próxima vez');
  }
  guardarProg();
  syncProgresoSesion(sesionNivel, s.num, ok, ok);
  actualizarStats();
  renderModal();
}

function siguiente(){
  const nivel=NIVELES[sesionNivel];
  const nextNum=sesionActual+1;
  if(nextNum<=nivel.sesiones.length){
    sesionActual=nextNum;
    respRespondida=false;
    viendoContenido=true;
    renderModal();
  } else {
    cerrarModal();
    renderEscuela();
    showToast('🎓 ¡Nivel completado!');
  }
}

// ── PERFIL ──
function renderPerfil(){
  const el=document.getElementById('view-perfil');
  let completadas=0, niveles=0;
  NIVEL_ORDER.forEach(nid=>{
    const ses=NIVELES[nid].sesiones;
    const comp=ses.filter(s=>progreso[nid+'_'+s.num]?.completada).length;
    completadas+=comp;
    if(comp===ses.length) niveles++;
  });
  const inicial=S.nombre?S.nombre.charAt(0).toUpperCase():'?';
  el.innerHTML=`
    <div class="perfil-card">
      <div class="perfil-avatar">${inicial}</div>
      <div class="perfil-nombre">${S.nombre||'—'}</div>
      <div class="perfil-cargo">${S.cargo||'—'}</div>
      <div class="perfil-stats">
        <div class="pstat"><div class="pstat-val">${completadas}</div><div class="pstat-label">Sesiones</div></div>
        <div class="pstat"><div class="pstat-val">${niveles}</div><div class="pstat-label">Niveles</div></div>
        <div class="pstat"><div class="pstat-val">${Math.round(completadas/TOTAL_SES*100)}%</div><div class="pstat-label">Progreso</div></div>
      </div>
    </div>
    <div style="text-align:center;margin-top:8px">
      <button onclick="if(confirm('¿Cerrar sesión?')){localStorage.removeItem('fooax_asesor');location.reload()}" 
        style="padding:10px 24px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer">
        Cambiar usuario
      </button>
    </div>`;
}

// ── TOAST ──
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── ARRANQUE ──
if(S.nombre){ mostrarApp(); }

// Registrar Service Worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(e=>console.log('SW error:',e));
}
